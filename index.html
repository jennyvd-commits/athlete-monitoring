<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mädchenbasketball Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; text-align:center; }
.card { background:white; padding:15px; border-radius:15px; margin:15px auto; max-width:400px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
button { width:100%; padding:12px; margin:5px 0; border-radius:10px; border:none; background:#2563eb; color:white; }
.logo { max-height:150px; margin-bottom:10px; }
.hidden { display:none; }
</style>
</head>
<body>

<img src="logo.png" class="logo" />
<h1>Mädchenbasketball Monitoring</h1>

<!-- START SCREEN -->
<div id="startScreen" class="card">
  <h3>Ich bin...</h3>
  <button onclick="selectRole('trainer')">Lehrer-Trainerin</button>
  <button onclick="selectRole('coach')">Vereinstrainer*in</button>
  <button onclick="selectRole('athlete')">Athletin</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="card hidden">
  <h3>Login</h3>
  <input id="email" placeholder="E-Mail">
  <input id="password" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <button onclick="loadTrainerDashboard()">📊 Dashboard</button>
  <select id="clubFilter" onchange="loadAthletes()">
    <option value="">Alle Vereine</option>
    <option>Alba Berlin</option>
    <option>BASS Berlin</option>
    <option>Basketball Gemeinschaft Zehlendorf</option>
    <option>BSC Berlin</option>
    <option>City Basket Berlin</option>
    <option>Einheit Pankow</option>
    <option>Friedenauer TSC</option>
    <option>TSC Spandau</option>
    <option>TuS Lichterfelde</option>
    <option>Weddinger Wiesel</option>
  </select>
  <div id="athletes"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let selectedRole = null;

function selectRole(role) {
  selectedRole = role;
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await auth.signInWithEmailAndPassword(email, password);
}

auth.onAuthStateChanged(async user => {
  if (!user) return;

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  const doc = await db.collection("users").doc(user.uid).get();
  const role = doc.data().role;
  const club = doc.data().club;

  if (role === "trainer") loadAthletes();
  if (role === "coach") loadAthletes(club);
});

function getColor(avg) {
  if (avg <= 2.5) return "#22c55e";
  if (avg <= 3.5) return "#eab308";
  if (avg <= 4.5) return "#f97316";
  return "#ef4444";
}

async function loadAthletes(forceClub=null) {
  const container = document.getElementById("athletes");
  container.innerHTML = "";

  const filter = forceClub || document.getElementById("clubFilter").value;

  let query = db.collection("athletes");
  if (filter) query = query.where("club","==",filter);

  const snapshot = await query.get();

  for (const doc of snapshot.docs) {
    const data = doc.data();

    const entries = await db.collection("entries")
      .where("athleteId","==",doc.id)
      .orderBy("date","asc")
      .get();

    const list = entries.docs.map(d => d.data());

    let avg = null;
    if (list.length >= 3) {
      const last3 = list.slice(-3);
      avg = last3.reduce((a,b)=>a+b.avg,0)/3;
    }

    const div = document.createElement("div");
    div.className = "card";
    div.style.background = avg ? getColor(avg) : "gray";
    div.style.color = "white";

    div.innerHTML = `
      <h3>${data.name}</h3>
      <p>${data.club}</p>
      <p>${avg ? avg.toFixed(2) : "-"}</p>
    `;

    div.onclick = () => showHistory(doc.id, data.name);

    container.appendChild(div);
  }
}

async function showHistory(id, name) {
  const snapshot = await db.collection("entries")
    .where("athleteId","==",id)
    .orderBy("date","asc")
    .get();

  let rows = "";

  snapshot.forEach(doc => {
    const d = doc.data();
    const date = new Date(d.date.seconds * 1000).toLocaleDateString();

    rows += `<tr>
      <td>${date}</td>
      <td>${d.sleep}</td>
      <td>${d.academic}</td>
      <td>${d.load}</td>
      <td>${d.avg.toFixed(2)}</td>
    </tr>`;
  });

  const win = window.open("", "_blank");
  win.document.write(`
    <h2>${name}</h2>
    <table border="1" style="width:100%">
    <tr><th>Datum</th><th>Schlaf</th><th>Schule</th><th>Belastung</th><th>Ø</th></tr>
    ${rows}
    </table>
    <button onclick="window.print()">PDF</button>
  `);
}

async function loadTrainerDashboard() {
  alert("Dashboard bleibt wie zuvor implementiert");
}

</script>

</body>
</html>
