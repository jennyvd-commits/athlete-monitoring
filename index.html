<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mädchenbasketball Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; text-align:center; }
.card { padding:15px; border-radius:15px; margin:15px auto; max-width:420px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
button { width:100%; padding:12px; margin:6px 0; border-radius:10px; border:none; background:#2563eb; color:white; }
.logo { max-height:150px; margin-bottom:10px; }
.hidden { display:none; }
.counter { display:flex; justify-content:space-between; align-items:center; margin:10px 0; }
.counter button { width:30%; }
.counter span { font-size:22px; }
input, select { width:100%; padding:10px; margin:6px 0; border-radius:8px; border:1px solid #ccc; }
.badge { display:inline-block; padding:4px 8px; border-radius:8px; font-size:12px; }
.tabs { display:flex; gap:10px; margin-bottom:10px; }
.tab { flex:1; padding:10px; border-radius:10px; background:#ddd; cursor:pointer; }
.active { background:#2563eb; color:white; }
canvas { max-width:100%; }
</style>
</head>

<body>

<img src="logo.png" class="logo" />
<h1>Mädchenbasketball Monitoring</h1>

<div id="startScreen" class="card">
  <h3>Ich bin...</h3>
  <button onclick="selectRole('trainer')">Lehrer-Trainerin</button>
  <button onclick="selectRole('coach')">Vereinstrainer*in</button>
  <button onclick="selectRole('athlete')">Athletin</button>
</div>

<div id="app" class="hidden">

<div class="tabs" id="tabs">
  <div class="tab active" onclick="showTab('create')">Athletin anlegen</div>
  <div class="tab" onclick="showTab('overview')">Übersicht Athletinnen</div>
</div>

<div class="card" id="createBox">
  <h3>Athletin anlegen</h3>
  <input id="name" placeholder="Name">
  <input id="birthdate" type="text" placeholder="Geburtsdatum">

  <select id="club">
    <option value="">Verein wählen</option>
    <option>Alba Berlin</option>
    <option>BASS Berlin</option>
    <option>Basketball Gemeinschaft Zehlendorf</option>
    <option>BSC Berlin</option>
    <option>City Basket Berlin</option>
    <option>Einheit Pankow</option>
    <option>Friedenauer TSC</option>
    <option>TSC Spandau</option>
    <option>TuS Lichterfelde</option>
    <option>Weddinger Wiesel</option>
    <option>Sonstige</option>
  </select>

  <input id="training" type="text" placeholder="Trainings pro Woche">
  <input id="schoolYear" type="text" placeholder="Seit wann auf der Schule (z.B. 2022/23)">
  <button onclick="createAthlete()">Athletin erstellen</button>
</div>

<div id="qrBox" class="card hidden">
  <canvas id="qrCanvas"></canvas>
  <p id="codeText"></p>
</div>

<div id="overviewBox" class="hidden"></div>

<div id="chartBox" class="card hidden">
  <h3>Verlauf</h3>
  <canvas id="chartCanvas" width="300" height="150"></canvas>
  <button onclick="closeChart()">Schließen</button>
</div>

</div>

<script>
let athletes = JSON.parse(localStorage.getItem("athletes") || "[]");
let entries = JSON.parse(localStorage.getItem("entries") || "[]");
let sortMode = "name";

const clubColors = {
  "Alba Berlin": "#facc15",
  "BASS Berlin": "#60a5fa",
  "BSC Berlin": "#f87171",
  "Basketball Gemeinschaft Zehlendorf": "#34d399",
  "City Basket Berlin": "#a78bfa",
  "Einheit Pankow": "#fb923c",
  "Friedenauer TSC": "#f472b6",
  "TSC Spandau": "#22d3ee",
  "TuS Lichterfelde": "#4ade80",
  "Weddinger Wiesel": "#fbbf24",
  "Sonstige": "#9ca3af"
};

function saveData() {
  localStorage.setItem("athletes", JSON.stringify(athletes));
  localStorage.setItem("entries", JSON.stringify(entries));
}

function selectRole(role) {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  showTab('create');
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  if (tab === 'create') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById("createBox").classList.remove("hidden");
    document.getElementById("overviewBox").classList.add("hidden");
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById("createBox").classList.add("hidden");
    showOverview();
  }
}

function createAthlete() {
  const name = document.getElementById("name").value;
  const birthdate = document.getElementById("birthdate").value;
  const club = document.getElementById("club").value;
  const training = document.getElementById("training").value;
  const schoolYear = document.getElementById("schoolYear").value;

  if (!name || !birthdate || !club || !training || !schoolYear) {
    alert("Bitte alles ausfüllen");
    return;
  }

  const id = Date.now().toString();
  const accessCode = Math.random().toString(36).substring(2,8);

  athletes.push({ id, name, birthdate, club, training, schoolYear, accessCode });
  saveData();

  const qrLink = window.location.href.split("?")[0] + "?athlete=" + id + "&code=" + accessCode;

  document.getElementById("qrBox").classList.remove("hidden");
  document.getElementById("codeText").innerText = "Code: " + accessCode;
  QRCode.toCanvas(document.getElementById("qrCanvas"), qrLink);
}

function getColor(avg) {
  if (avg <= 2.5) return "green";
  if (avg <= 3.5) return "yellow";
  if (avg <= 4.5) return "orange";
  return "red";
}

function get3DayAvg(id) {
  const list = entries.filter(e => e.athleteId === id).slice(-3);
  if (!list.length) return null;
  return list.reduce((a,b)=>a+b.avg,0)/list.length;
}

function showOverview() {
  const container = document.getElementById("overviewBox");
  container.classList.remove("hidden");

  let list = [...athletes];

  if (sortMode === "name") list.sort((a,b)=>a.name.localeCompare(b.name));
  else list.sort((a,b)=>a.club.localeCompare(b.club));

  container.innerHTML = `
    <button onclick="setSort('name')">Sortieren: Name</button>
    <button onclick="setSort('club')">Sortieren: Verein</button>
  `;

  list.forEach(a => {
    const avg = get3DayAvg(a.id);
    const color = avg ? getColor(avg) : "grey";
    const bg = clubColors[a.club] || "white";

    const div = document.createElement("div");
    div.className = "card";
    div.style.background = bg;

    div.innerHTML = `
      <h3>${a.name}</h3>
      <p>${a.club}</p>
      <p>Schule seit: ${a.schoolYear || '-'} </p>
      <div class="badge" style="background:${color}">Status</div>
      <button onclick="showHistory('${a.id}')">Verlauf anzeigen</button>
      <button onclick="deleteAthlete('${a.id}')">❌ Löschen</button>
    `;

    container.appendChild(div);
  });
}

function setSort(mode) {
  sortMode = mode;
  showOverview();
}

function showHistory(id) {
  const data = entries.filter(e => e.athleteId === id);
  const canvas = document.getElementById("chartCanvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!data.length) return alert("Keine Daten vorhanden");

  const values = data.map(e=>e.avg);
  const max = 6;

  const stepX = canvas.width / (values.length - 1 || 1);

  ctx.beginPath();
  values.forEach((v,i)=>{
    const x = i * stepX;
    const y = canvas.height - (v/max)*canvas.height;
    if (i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });
  ctx.stroke();

  document.getElementById("chartBox").classList.remove("hidden");
}

function closeChart(){
  document.getElementById("chartBox").classList.add("hidden");
}

function deleteAthlete(id) {
  athletes = athletes.filter(a => a.id !== id);
  entries = entries.filter(e => e.athleteId !== id);
  saveData();
  showOverview();
}

const params = new URLSearchParams(window.location.search);
const athleteId = params.get("athlete");

if (athleteId) {
  document.body.innerHTML = `
    <h2>Daily Check</h2>

    <p>Schlafqualität</p>
    <div class="counter">
      <button onclick="change('sleep',-1)">-</button>
      <span id="sleep">3</span>
      <button onclick="change('sleep',1)">+</button>
    </div>

    <p>Schulbelastung</p>
    <div class="counter">
      <button onclick="change('academic',-1)">-</button>
      <span id="academic">3</span>
      <button onclick="change('academic',1)">+</button>
    </div>

    <p>Belastung Vortag</p>
    <div class="counter">
      <button onclick="change('load',-1)">-</button>
      <span id="load">3</span>
      <button onclick="change('load',1)">+</button>
    </div>

    <button onclick="saveEntry('${athleteId}')">Speichern</button>
  `;
}

function change(field, delta) {
  const el = document.getElementById(field);
  let val = parseInt(el.innerText);
  val = Math.min(6, Math.max(1, val + delta));
  el.innerText = val;
}

function saveEntry(id) {
  const sleep = parseInt(document.getElementById("sleep").innerText);
  const academic = parseInt(document.getElementById("academic").innerText);
  const load = parseInt(document.getElementById("load").innerText);

  const avg = (sleep + academic + load) / 3;
  const today = new Date().toISOString().split("T")[0];

  const last = entries.filter(e => e.athleteId === id).slice(-1)[0];

  if (last) {
    let d = new Date(last.date);
    d.setDate(d.getDate()+1);

    while (d.toISOString().split("T")[0] < today) {
      entries.push({ ...last, date: d.toISOString().split("T")[0] });
      d.setDate(d.getDate()+1);
    }
  }

  entries.push({ athleteId:id, sleep, academic, load, avg, date:today });
  saveData();
  alert("Gespeichert");
}

</script>

</body>
</html>
